services:
  - type: web
    name: swim-coach-backend
    env: python
    buildCommand: |
      apt-get update && apt-get install -y \
      ffmpeg \
      libgl1 \
      libglib2.0-0 \
      libsm6 \
      libxext6 \
      libxrender1 \
      libxcb1
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000